[phases.setup]
nixPkgs = ["nodejs_22", "gcc", "gnumake", "python3"]

[phases.clean]
cmds = ["rm -rf node_modules package-lock.json", "echo 'Cache cleared'"]

[phases.install]
cmds = ["npm install --foreground-scripts --force"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node server/index.js"

[variables]
NPM_CONFIG_FORCE = "true"
NPM_CONFIG_CACHE = "/tmp/npm-cache"
